name: xiaoshiliu

services:
  # MySQL数据库服务
  mysql:
    # 使用官方MySQL镜像
    image: mysql:8.0
    container_name: xiaoshiliu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-xiaoshiliu}
      MYSQL_USER: ${DB_USER:-xiaoshiliu_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456}
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./express-project/scripts/init-database.sql:/docker-entrypoint-initdb.d/init.sql
      - /etc/localtime:/etc/localtime:ro
    networks:
      - xiaoshiliu-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # 后端API服务
  backend:
    build:
      context: ./express-project
      dockerfile: Dockerfile
    container_name: xiaoshiliu-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_USER: ${DB_USER:-xiaoshiliu_user}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-xiaoshiliu}
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET:-xiaoshiliu_secret_key_2025}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-30d}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:3001}
      LOG_APP_NAME: ${LOG_APP_NAME:-astrbot-community-api}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_IGNORE_PATHS: ${LOG_IGNORE_PATHS:-/api/health}
      IMAGE_MAX_SIZE: ${IMAGE_MAX_SIZE:-10mb}
      VIDEO_MAX_SIZE: ${VIDEO_MAX_SIZE:-100mb}
      IMAGE_UPLOAD_STRATEGY: ${IMAGE_UPLOAD_STRATEGY:-imagehost}
      VIDEO_UPLOAD_STRATEGY: ${VIDEO_UPLOAD_STRATEGY:-local}
      IMAGE_LOCAL_UPLOAD_DIR: ${IMAGE_LOCAL_UPLOAD_DIR:-uploads/images}
      VIDEO_LOCAL_UPLOAD_DIR: ${VIDEO_LOCAL_UPLOAD_DIR:-uploads/videos}
      LOCAL_BASE_URL: ${LOCAL_BASE_URL:-http://localhost:3001}
      IMAGEHOST_API_URL: ${IMAGEHOST_API_URL:-https://api.xinyew.cn/api/360tc}
      IMAGEHOST_TIMEOUT: ${IMAGEHOST_TIMEOUT:-60000}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-AstrBot Community}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3001/api/auth/github/callback}
      GITHUB_SCOPE: ${GITHUB_SCOPE:-read:user user:email}
      IP_LOCATION_PRIMARY_API: ${IP_LOCATION_PRIMARY_API:-https://api.pearktrue.cn/api/ip/details}
      IP_LOCATION_PRIMARY_TIMEOUT: ${IP_LOCATION_PRIMARY_TIMEOUT:-10000}
      IP_LOCATION_BACKUP_API: ${IP_LOCATION_BACKUP_API:-https://api.pearktrue.cn/api/ip/high}
      IP_LOCATION_BACKUP_TIMEOUT: ${IP_LOCATION_BACKUP_TIMEOUT:-5000}
      TZ: Asia/Shanghai
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
    networks:
      - xiaoshiliu-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端Web服务
  frontend:
    build:
      context: ./vue3-project
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_USE_REAL_API: ${VITE_USE_REAL_API:-false}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-AstrBot Community}
    container_name: xiaoshiliu-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8080:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - xiaoshiliu-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  xiaoshiliu-network:
    driver: bridge
